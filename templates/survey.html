<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.6rem; color: #1a1a1a; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 0.95rem; }
    .question { margin-bottom: 24px; }
    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .question-num {
      display: inline-block;
      background: #6366f1;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 24px;
      font-size: 0.75rem;
      margin-right: 8px;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s;
      color: #1a1a1a;
    }
    textarea:focus {
      outline: none;
      border-color: #6366f1;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Quick Survey</h1>
    <p class="subtitle">Your feedback takes less than 2 minutes and means a lot.</p>
    <form action="/submit" method="post">
      {% for question in questions %}
      <div class="question">
        <label>
          <span class="question-num">{{ loop.index }}</span>{{ question }}
        </label>
        <textarea name="q{{ loop.index }}" placeholder="Your answer..."></textarea>
      </div>
      {% endfor %}
      <button type="submit">Submit &rarr;</button>
    </form>
  </div>
</body>
</html>
